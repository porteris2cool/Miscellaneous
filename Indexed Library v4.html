<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indexed Library v4</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --bg: #08090A;
      --surface: #111214;
      --card: #191B1E;
      --card-hover: #1F2125;
      --border: #282A2E;
      --border-hi: #3A3D42;
      --fg: #EAEAED;
      --muted: #6E7078;
      --accent: #F5A623;
      --accent-dim: rgba(245, 166, 35, 0.1);
      --accent-glow: rgba(245, 166, 35, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }

    .bg-orb-1 {
      width: 500px;
      height: 500px;
      background: var(--accent);
      top: -150px;
      left: -120px;
      animation: orb1 22s ease-in-out infinite;
    }

    .bg-orb-2 {
      width: 350px;
      height: 350px;
      background: #E8614D;
      bottom: -80px;
      right: -80px;
      animation: orb2 28s ease-in-out infinite;
    }

    .bg-orb-3 {
      width: 250px;
      height: 250px;
      background: #34D399;
      top: 40%;
      left: 60%;
      animation: orb3 20s ease-in-out infinite;
    }

    @keyframes orb1 {
      0%, 100% { transform: translate(0, 0) }
      33% { transform: translate(120px, 100px) }
      66% { transform: translate(-40px, 150px) }
    }

    @keyframes orb2 {
      0%, 100% { transform: translate(0, 0) }
      33% { transform: translate(-100px, -80px) }
      66% { transform: translate(80px, -120px) }
    }

    @keyframes orb3 {
      0%, 100% { transform: translate(0, 0) }
      50% { transform: translate(-140px, 70px) }
    }

    .noise-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='256' height='256' fill='%23000' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    .controls-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }

    .filter-btn {
      position: relative;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 12px;
      flex-shrink: 0;
    }

    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--fg);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    .filter-btn .arrow {
      position: absolute;
      font-size: 8px;
      bottom: 1px;
      right: 1px;
      opacity: 0.7;
    }

    .view-toggle {
      display: flex;
      gap: 4px;
    }

    .view-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .view-btn:hover {
      border-color: var(--accent);
      color: var(--fg);
    }

    .view-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    .all-files-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .all-files-btn:hover {
      border-color: var(--accent);
      color: var(--fg);
    }

    .all-files-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    .folder-dropdown {
      flex: 1;
      padding: 6px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--fg);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .folder-dropdown:hover {
      border-color: var(--accent);
    }

    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      padding: 8px 16px 120px;
    }

    .file-grid.list-view {
      grid-template-columns: 1fr;
    }

    .file-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 22px 14px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      min-height: 110px;
      animation: fadeUp 0.4s ease both;
    }

    .file-grid.list-view .file-btn {
      flex-direction: row;
      justify-content: flex-start;
      padding: 12px 16px;
      min-height: auto;
      gap: 12px;
    }

    .file-grid.list-view .file-icon {
      margin-bottom: 0 !important;
    }

    .file-grid.list-view .file-name {
      text-align: left;
      flex: 1;
    }

    .file-grid.list-view .file-ext {
      margin-top: 0;
      margin-left: auto;
    }

    .file-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .file-btn:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(245, 166, 35, 0.08);
    }

    .file-btn:hover::after {
      opacity: 1;
    }

    .file-btn:active {
      transform: translateY(-1px);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .file-btn .action-btn {
      position: absolute;
      top: 6px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--muted);
      opacity: 1;
      transition: all 0.2s;
      z-index: 2;
    }

    .file-btn .pin-btn {
      right: 32px;
    }

    .file-btn .download-btn {
      right: 6px;
    }

    .file-grid.list-view .action-btn {
      position: relative;
      top: auto;
      right: auto;
    }

    .file-btn .action-btn:hover {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .file-btn .action-btn.pinned {
      color: var(--accent);
    }

    .file-btn .file-icon {
      width: 30px;
      height: 30px;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .file-btn .file-name {
      font-size: 12.5px;
      font-weight: 600;
      text-align: center;
      word-break: break-word;
      line-height: 1.3;
      position: relative;
      z-index: 1;
      max-width: 100%;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .file-btn .file-ext {
      font-size: 10px;
      font-weight: 700;
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: relative;
      z-index: 1;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(2px);
    }

    .sidebar-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 300px;
      max-width: 85vw;
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 50;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--fg);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: grab;
      width: 100%;
      text-align: left;
      transition: all 0.2s;
    }

    .sidebar-item:active {
      cursor: grabbing;
    }

    .sidebar-item.dragging {
      opacity: 0.5;
    }

    .sidebar-item.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .sidebar-item:hover {
      border-color: var(--accent);
      background: var(--card-hover);
    }

    .sidebar-action {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--fg);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: all 0.2s;
    }

    .sidebar-action:hover {
      border-color: var(--border-hi);
      background: var(--card);
    }

    .toast-container {
      position: fixed;
      bottom: 80px;
      right: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--fg);
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      pointer-events: auto;
      max-width: 320px;
    }

    .toast.error {
      border-color: #E8614D;
      color: #F0A0A0;
    }

    .toast.success {
      border-color: #34D399;
      color: #A0F0D0;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.96)
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1)
      }
    }

    @keyframes toastOut {
      from {
        opacity: 1;
        transform: translateY(0)
      }
      to {
        opacity: 0;
        transform: translateY(8px)
      }
    }

    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, var(--border) 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 14px;
      min-height: 110px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0 }
      100% { background-position: -200% 0 }
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .search-wrap {
      position: relative;
      padding: 0 16px 6px;
    }

    .search-wrap input {
      width: 100%;
      padding: 9px 14px 9px 38px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--fg);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
    }

    .search-wrap input::placeholder {
      color: var(--muted);
    }

    .search-wrap .search-icon {
      position: absolute;
      left: 28px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search-wrap .clear-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
      opacity: 0;
      pointer-events: none;
    }

    .search-wrap input:not(:placeholder-shown) ~ .clear-btn {
      opacity: 1;
      pointer-events: all;
    }

    .search-wrap .clear-btn:hover {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .scroll-to-top {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--fg);
      cursor: pointer;
      transition: all 0.3s;
      opacity: 0;
      pointer-events: none;
      z-index: 80;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .scroll-to-top:hover {
      border-color: var(--accent);
      background: var(--card-hover);
      transform: translateY(-2px);
    }

    .scroll-to-top.show {
      opacity: 1;
      pointer-events: all;
    }

    .file-info-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(4px);
    }

    .file-info-modal.open {
      opacity: 1;
      pointer-events: all;
    }

    .file-info-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .file-info-card h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .file-info-card .info-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .file-info-card .info-row:last-child {
      border-bottom: none;
    }

    .file-info-card .info-label {
      color: var(--muted);
      font-weight: 500;
    }

    .file-info-card .info-value {
      color: var(--fg);
      font-weight: 600;
    }

    .file-info-card .close-btn {
      float: right;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      transition: all 0.2s;
    }

    .file-info-card .close-btn:hover {
      color: var(--fg);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 640px) {
      .file-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 10px;
        padding: 6px 12px 120px;
      }

      .controls-bar {
        flex-wrap: wrap;
        gap: 6px;
      }

      .folder-dropdown {
        flex: 1;
        min-width: 100px;
      }
    }
  </style>
</head>

<body>

  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  <div class="noise-overlay"></div>

  <div class="toast-container" id="toastContainer"></div>

  <div class="file-info-modal" id="fileInfoModal">
    <div class="file-info-card">
      <button class="close-btn" id="closeInfoBtn" aria-label="Close">
        <i data-lucide="x" style="width:18px; height:18px;"></i>
      </button>
      <h3 id="infoFileName"></h3>
      <div id="fileInfoContent"></div>
    </div>
  </div>

  <button class="scroll-to-top" id="scrollToTopBtn" title="Scroll to top" aria-label="Scroll to top">
    <i data-lucide="arrow-up" style="width:18px; height:18px;"></i>
  </button>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main menu">
    <div style="padding:18px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border);">
      <h2 style="font-family:'Space Grotesk',sans-serif; font-size:17px; font-weight:700;">Menu</h2>
      <button id="closeSidebarBtn" style="background:none; border:none; color:var(--fg); cursor:pointer; padding:4px; border-radius:6px; transition:background 0.2s;" aria-label="Close menu">
        <i data-lucide="x" style="width:20px; height:20px;"></i>
      </button>
    </div>
    <div style="padding:20px; flex:1; overflow-y:auto;">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:14px;">
        <i data-lucide="pin" style="width:14px; height:14px; color:var(--accent);"></i>
        <span style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; color:var(--muted);">Pinned</span>
      </div>
      <div id="pinnedList" style="display:flex; flex-direction:column; gap:6px;"></div>
      <p id="pinnedEmpty" style="color:var(--muted); font-size:12px; line-height:1.6; padding:4px 0;">
        No pinned items yet. Hover a file button and tap the pin icon to add it here.
      </p>
    </div>
    <div style="padding:14px 20px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:8px;">
      <button class="sidebar-action" id="sidebarRefresh">
        <i data-lucide="refresh-cw" style="width:15px; height:15px; color:var(--muted);"></i>
        Refresh Repository
      </button>
    </div>
  </aside>

  <div id="mainScreen" style="position:relative; z-index:1; min-height:100vh;">
    <header style="display:flex; align-items:center; justify-content:space-between; padding:10px 16px; border-bottom:1px solid var(--border); background:rgba(8,9,10,0.82); backdrop-filter:blur(16px);">
      <div style="display:flex; align-items:center; gap:12px;">
        <button id="openSidebarBtn" style="background:none; border:none; color:var(--fg); cursor:pointer; padding:6px; border-radius:8px; transition:background 0.2s;" aria-label="Open menu">
          <i data-lucide="menu" style="width:22px; height:22px;"></i>
        </button>
        <div>
          <h1 id="repoTitle" style="font-family:'Space Grotesk',sans-serif; font-size:17px; font-weight:700; line-height:1.2;"></h1>
          <p id="repoSubtitle" style="font-size:11px; color:var(--muted); margin-top:1px;"></p>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:4px;">
        <span id="fileCount" style="font-size:11px; color:var(--muted); margin-right:8px; font-weight:500;"></span>
        <button id="refreshBtn" style="background:none; border:none; color:var(--muted); cursor:pointer; padding:8px; border-radius:8px; transition:all 0.2s;" aria-label="Refresh">
          <i data-lucide="refresh-cw" style="width:17px; height:17px;"></i>
        </button>
      </div>
    </header>

    <div class="search-wrap">
      <i data-lucide="search" class="search-icon" style="width:15px; height:15px;"></i>
      <input type="text" id="searchInput" placeholder="Search files..." spellcheck="false">
      <button id="clearSearchBtn" class="clear-btn" title="Clear search" aria-label="Clear search">
        <i data-lucide="x" style="width:16px; height:16px;"></i>
      </button>
    </div>

    <div class="controls-bar">
      <button id="pinFilterBtn" class="filter-btn" title="Pin Filter">
        <i data-lucide="pin" style="width:14px; height:14px;"></i>
        <span class="arrow">↓</span>
      </button>
      <button id="sizeFilterBtn" class="filter-btn" title="Filter by Size">
        <i data-lucide="arrow-up-down" style="width:12px; height:12px;"></i>
        <span class="arrow">↓</span>
      </button>
      <button id="dateFilterBtn" class="filter-btn" title="Recently Modified">
        <i data-lucide="clock" style="width:14px; height:14px;"></i>
        <span class="arrow">↓</span>
      </button>
      <div class="view-toggle">
        <button id="allFilesBtn" class="all-files-btn active" title="All Files">
          <i data-lucide="files" style="width:16px; height:16px;"></i>
        </button>
        <button id="gridViewBtn" class="view-btn active" title="Grid View">
          <i data-lucide="grid-3x3" style="width:16px; height:16px;"></i>
        </button>
        <button id="listViewBtn" class="view-btn" title="List View">
          <i data-lucide="list" style="width:16px; height:16px;"></i>
        </button>
      </div>
      <select id="folderDropdown" class="folder-dropdown">
        <option value="">All Folders</option>
      </select>
    </div>

    <main class="file-grid" id="fileGrid"></main>
  </div>

  <script>
    // Fuzzy search implementation
    function fuzzyMatch(haystack, needle) {
      const hlen = haystack.length;
      const nlen = needle.length;
      if (nlen > hlen) return false;
      if (nlen === hlen) return haystack === needle;

      let j = 0;
      for (let i = 0; i < hlen && j < nlen; i++) {
        if (haystack[i] === needle[j]) j++;
      }
      return j === nlen;
    }

    function fuzzySearch(query, items, key) {
      if (!query) return items;
      const q = query.toLowerCase();
      return items.filter(item => {
        const text = item[key].toLowerCase();
        return fuzzyMatch(text, q);
      });
    }

    // Folder icons mapping
    const folderIcons = {
      'tools': 'wrench',
      'games': 'gamepad2',
      'projects': 'briefcase',
      'assets': 'image',
      'docs': 'book',
      'code': 'code',
      'media': 'play-circle',
      'data': 'database'
    };

    const state = {
      owner: 'Ion-o-koji',
      repo: 'Ion-o-koji-s-Index',
      branch: '',
      files: [],
      folders: [],
      activeTab: '',
      pinned: [],
      searchQuery: '',
      sortBy: 'name',
      viewMode: 'grid',
      draggedPinIndex: null,
      filterPins: false,
      filterBySize: false,
      filterByDate: false,
      sortAscending: { pins: false, size: true, date: true },
      selectedFolder: '',
      fileMetadata: {},
      isLoading: false,
    };

    const ALLOWED_EXT = ['html', 'htm', 'md', 'markdown'];

    function savePins() {
      localStorage.setItem('Ion-o-koji_pins', JSON.stringify(state.pinned));
    }

    function loadPins() {
      try {
        const d = JSON.parse(localStorage.getItem('Ion-o-koji_pins'));
        if (d && Array.isArray(d)) state.pinned = d;
      } catch (e) {}
    }

    function loadPreferences() {
      const prefs = localStorage.getItem('Ion-o-koji_prefs');
      if (prefs) {
        const p = JSON.parse(prefs);
        if (p.sortBy) state.sortBy = p.sortBy;
        if (p.viewMode) state.viewMode = p.viewMode;
      }
    }

    function savePreferences() {
      localStorage.setItem('Ion-o-koji_prefs', JSON.stringify({
        sortBy: state.sortBy,
        viewMode: state.viewMode
      }));
    }

    function toast(msg, type = 'info') {
      const c = document.getElementById('toastContainer');
      const el = document.createElement('div');
      el.className = 'toast ' + type;
      el.textContent = msg;
      c.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    async function fetchDefaultBranch(owner, repo) {
      const url = `https://api.github.com/repos/${owner}/${repo}`;
      const res = await fetch(url);
      if (res.status === 404) throw new Error('Repository not found.');
      if (res.status === 403) throw new Error('GitHub API rate limit hit. Wait a minute and try again.');
      if (!res.ok) throw new Error('GitHub API error: ' + res.status);
      const data = await res.json();
      if (data.private) throw new Error('This repository is private.');
      return data.default_branch;
    }

    async function fetchTree(owner, repo, branch) {
      const url = `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Failed to fetch repository tree: ' + res.status);
      const data = await res.json();
      if (data.truncated) toast('Large repo — some files may be missing', 'error');
      return data.tree.filter(i => i.type === 'blob');
    }

    async function fetchFileContent(path) {
      const url = `https://raw.githubusercontent.com/${state.owner}/${state.repo}/${state.branch}/${path}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Failed to fetch file');
      return res.text();
    }

    async function getFileMetadata(path) {
      try {
        const url = `https://api.github.com/repos/${state.owner}/${state.repo}/commits?path=${path}&per_page=1`;
        const res = await fetch(url);
        if (!res.ok) return null;
        const commits = await res.json();
        if (commits.length > 0) {
          return {
            lastModified: new Date(commits[0].commit.author.date),
            author: commits[0].commit.author.name
          };
        }
      } catch (e) {}
      return null;
    }

    function parseTree(tree) {
      const files = [];
      const folderSet = new Set();

      for (const item of tree) {
        const parts = item.path.split('/');
        if (parts.some(p => p.startsWith('.'))) continue;

        const name = parts[parts.length - 1];
        const ext = name.includes('.') ? name.split('.').pop().toLowerCase() : '';

        if (!ALLOWED_EXT.includes(ext)) continue;

        const folder = parts.length > 1 ? parts.slice(0, -1).join('/') : '';

        files.push({
          name: name.includes('.') ? name.slice(0, name.lastIndexOf('.')) : name,
          fullName: name,
          path: item.path,
          extension: ext,
          folder,
          size: item.size || 0,
          sha: item.sha,
          type: 'file'
        });

        for (let i = 1; i < parts.length; i++) {
          folderSet.add(parts.slice(0, i).join('/'));
        }
      }

      const folders = Array.from(folderSet).sort();
      return { files, folders };
    }

    function getFolderIcon(folderName) {
      const lower = folderName.toLowerCase();
      for (const [key, icon] of Object.entries(folderIcons)) {
        if (lower.includes(key)) return icon;
      }
      return 'folder';
    }

    function fileIcon(ext, folder = '') {
      if (['html', 'htm'].includes(ext)) return 'globe';
      if (['md', 'markdown'].includes(ext)) return 'file-text';
      return 'file';
    }

    function extColor(ext) {
      if (['html', 'htm'].includes(ext)) return '#E8614D';
      if (['md', 'markdown'].includes(ext)) return '#9CA3AF';
      return '#6E7078';
    }

    function extLabel(ext) {
      if (['html', 'htm'].includes(ext)) return 'HTML';
      if (['md', 'markdown'].includes(ext)) return 'MD';
      return ext.toUpperCase();
    }

    function formatFileSize(bytes) {
      if (!bytes) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
    }

    function getRelativeTime(date) {
      const seconds = Math.floor((new Date() - date) / 1000);
      if (seconds < 60) return 'just now';
      if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
      if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
      if (seconds < 604800) return Math.floor(seconds / 86400) + 'd ago';
      return Math.floor(seconds / 604800) + 'w ago';
    }

    async function downloadFile(file) {
      try {
        const content = await fetchFileContent(file.path);
        const filename = file.fullName;
        
        const blob = new Blob([content], { type: "text/html" });

        if ('showSaveFilePicker' in window) {
          try {
            const handle = await window.showSaveFilePicker({
              suggestedName: filename,
              types: [{ description: "Files", accept: { "*/*": [".html", ".md"] } }],
            });
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            toast('File saved', 'success');
            return;
          } catch (err) {
            if (err.name === 'AbortError') return;
          }
        }

        try {
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          toast('File saved', 'success');
        } catch (err) {
          toast('Download failed', 'error');
        }
      } catch (e) {
        toast('Failed: ' + e.message, 'error');
      }
    }

    async function runFile(file) {
      try {
        const content = await fetchFileContent(file.path);
        const ext = file.extension;

        if (['html', 'htm'].includes(ext)) {
          const w = window.open('about:blank', '_blank');
          if (!w) {
            toast('Pop-up blocked — allow pop-ups for this site', 'error');
            return;
          }
          w.document.open();
          w.document.write(content);
          w.document.close();
        } else if (['md', 'markdown'].includes(ext)) {
          const html = `<!DOCTYPE html><html><head><style>body{font-family:sans-serif;max-width:800px;margin:0 auto;padding:20px;background:#f5f5f5}pre{background:#333;color:#0f0;padding:15px;border-radius:5px;overflow-x:auto}</style></head><body><h1>${file.fullName}</h1><pre>${content.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</pre></body></html>`;
          const w = window.open('about:blank', '_blank');
          if (!w) {
            toast('Pop-up blocked — allow pop-ups for this site', 'error');
            return;
          }
          w.document.open();
          w.document.write(html);
          w.document.close();
        }
      } catch (e) {
        toast('Failed to run: ' + e.message, 'error');
      }
    }

    function showFileInfo(file) {
      const modal = document.getElementById('fileInfoModal');
      const meta = state.fileMetadata[file.path];
      
      let infoHtml = `
        <div class="info-row">
          <span class="info-label">Type</span>
          <span class="info-value">${extLabel(file.extension)}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Size</span>
          <span class="info-value">${formatFileSize(file.size)}</span>
        </div>
      `;

      if (meta && meta.lastModified) {
        infoHtml += `
          <div class="info-row">
            <span class="info-label">Modified</span>
            <span class="info-value">${getRelativeTime(meta.lastModified)}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Last Author</span>
            <span class="info-value">${meta.author}</span>
          </div>
        `;
      }

      document.getElementById('infoFileName').innerHTML = `<i data-lucide="${fileIcon(file.extension)}" style="width:20px; height:20px;"></i> ${file.fullName}`;
      document.getElementById('fileInfoContent').innerHTML = infoHtml;
      modal.classList.add('open');

      if (window.lucide) window.lucide.createIcons();
    }

    function renderFileGrid(files) {
      const grid = document.getElementById('fileGrid');
      grid.innerHTML = '';

      if (!files.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><p>No files found</p></div>';
        return;
      }

      files.forEach((file, idx) => {
        const isPinned = state.pinned.some(p => p.path === file.path);
        const btn = document.createElement('button');
        btn.className = 'file-btn';
        btn.innerHTML = `
          <button class="action-btn pin-btn ${isPinned ? 'pinned' : ''}" title="Pin">
            <i data-lucide="pin" style="width:14px; height:14px;"></i>
          </button>
          <button class="action-btn download-btn" title="Download">
            <i data-lucide="download" style="width:14px; height:14px;"></i>
          </button>
          <div class="file-icon">
            <i data-lucide="${fileIcon(file.extension, file.folder)}" style="width:30px; height:30px;"></i>
          </div>
          <div class="file-name">${file.fullName}</div>
          <div class="file-ext" style="background-color:${extColor(file.extension)}40">${extLabel(file.extension)}</div>
        `;

        btn.addEventListener('click', () => runFile(file));

        const pinBtn = btn.querySelector('.pin-btn');
        pinBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (isPinned) {
            state.pinned = state.pinned.filter(p => p.path !== file.path);
          } else {
            state.pinned.push(file);
          }
          savePins();
          renderFileGrid(files);
          updatePinnedList();
        });

        const dlBtn = btn.querySelector('.download-btn');
        dlBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          downloadFile(file);
        });

        btn.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          showFileInfo(file);
        });

        grid.appendChild(btn);
      });

      if (window.lucide) window.lucide.createIcons();
    }

    function updatePinnedList() {
      const list = document.getElementById('pinnedList');
      const empty = document.getElementById('pinnedEmpty');
      list.innerHTML = '';

      if (!state.pinned.length) {
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';

      state.pinned.forEach((file, idx) => {
        const item = document.createElement('div');
        item.className = 'sidebar-item';
        item.draggable = true;
        item.innerHTML = `
          <i data-lucide="${fileIcon(file.extension)}" style="width:14px; height:14px;"></i>
          <span>${file.fullName}</span>
        `;

        item.addEventListener('dragstart', () => {
          state.draggedPinIndex = idx;
          item.classList.add('dragging');
        });

        item.addEventListener('dragend', () => {
          item.classList.remove('dragging');
        });

        item.addEventListener('dragover', (e) => {
          e.preventDefault();
          item.classList.add('drag-over');
        });

        item.addEventListener('dragleave', () => {
          item.classList.remove('drag-over');
        });

        item.addEventListener('drop', (e) => {
          e.preventDefault();
          item.classList.remove('drag-over');
          if (state.draggedPinIndex !== null && state.draggedPinIndex !== idx) {
            const [moved] = state.pinned.splice(state.draggedPinIndex, 1);
            state.pinned.splice(idx, 0, moved);
            savePins();
            updatePinnedList();
          }
        });

        item.addEventListener('click', () => runFile(file));

        list.appendChild(item);
      });

      if (window.lucide) window.lucide.createIcons();
    }

    function applyFilters() {
      let result = [...state.files];

      // Filter by folder
      if (state.selectedFolder) {
        result = result.filter(f => f.folder === state.selectedFolder);
      }

      // Filter by search
      if (state.searchQuery) {
        result = fuzzySearch(state.searchQuery, result, 'fullName');
      }

      // Sort pins
      if (state.filterPins) {
        const pinned = result.filter(f => state.pinned.some(p => p.path === f.path));
        const unpinned = result.filter(f => !state.pinned.some(p => p.path === f.path));
        result = pinned.concat(unpinned);
      }

      // Sort by size
      if (state.filterBySize) {
        result.sort((a, b) => state.sortAscending.size ? a.size - b.size : b.size - a.size);
      }

      // Sort by date (requires metadata)
      if (state.filterByDate) {
        result.sort((a, b) => {
          const aDate = state.fileMetadata[a.path]?.lastModified || new Date(0);
          const bDate = state.fileMetadata[b.path]?.lastModified || new Date(0);
          return state.sortAscending.date ? aDate - bDate : bDate - aDate;
        });
      }

      // Default sort by name
      if (!state.filterBySize && !state.filterByDate) {
        result.sort((a, b) => a.fullName.localeCompare(b.fullName));
      }

      return result;
    }

    function updateUI() {
      const filtered = applyFilters();

      // Update file grid
      document.getElementById('fileGrid').classList.toggle('list-view', state.viewMode === 'list');
      renderFileGrid(filtered);

      // Update button states
      document.getElementById('pinFilterBtn').classList.toggle('active', state.filterPins);
      document.getElementById('sizeFilterBtn').classList.toggle('active', state.filterBySize);
      document.getElementById('dateFilterBtn').classList.toggle('active', state.filterByDate);
      document.getElementById('gridViewBtn').classList.toggle('active', state.viewMode === 'grid');
      document.getElementById('listViewBtn').classList.toggle('active', state.viewMode === 'list');

      // Update file count
      document.getElementById('fileCount').textContent = filtered.length + ' files';
    }

    async function initApp() {
      state.isLoading = true;
      try {
        state.branch = await fetchDefaultBranch(state.owner, state.repo);
        const tree = await fetchTree(state.owner, state.repo, state.branch);
        const parsed = parseTree(tree);
        state.files = parsed.files;
        state.folders = parsed.folders;

        // Update folder dropdown
        const folderSelect = document.getElementById('folderDropdown');
        state.folders.forEach(folder => {
          const opt = document.createElement('option');
          opt.value = folder;
          opt.textContent = folder;
          folderSelect.appendChild(opt);
        });

        // Load file metadata
        for (const file of state.files.slice(0, 20)) {
          const meta = await getFileMetadata(file.path);
          if (meta) state.fileMetadata[file.path] = meta;
        }

        loadPins();
        loadPreferences();
        updateUI();

        document.getElementById('repoTitle').textContent = state.repo;
        document.getElementById('repoSubtitle').textContent = `${state.owner} • ${state.files.length} files`;
      } catch (e) {
        toast(e.message, 'error');
      } finally {
        state.isLoading = false;
      }
    }

    // Event listeners
    document.getElementById('openSidebarBtn').addEventListener('click', () => {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('sidebarOverlay').classList.add('open');
    });

    document.getElementById('closeSidebarBtn').addEventListener('click', () => {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('open');
    });

    document.getElementById('sidebarOverlay').addEventListener('click', () => {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('open');
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
      state.searchQuery = e.target.value;
      updateUI();
    });

    document.getElementById('clearSearchBtn').addEventListener('click', () => {
      document.getElementById('searchInput').value = '';
      state.searchQuery = '';
      updateUI();
    });

    document.getElementById('gridViewBtn').addEventListener('click', () => {
      state.viewMode = 'grid';
      savePreferences();
      updateUI();
    });

    document.getElementById('listViewBtn').addEventListener('click', () => {
      state.viewMode = 'list';
      savePreferences();
      updateUI();
    });

    document.getElementById('pinFilterBtn').addEventListener('click', () => {
      state.filterPins = !state.filterPins;
      state.filterBySize = false;
      state.filterByDate = false;
      updateUI();
    });

    document.getElementById('sizeFilterBtn').addEventListener('click', () => {
      if (state.filterBySize) {
        state.sortAscending.size = !state.sortAscending.size;
      }
      state.filterBySize = !state.filterBySize;
      state.filterPins = false;
      state.filterByDate = false;
      updateUI();
    });

    document.getElementById('dateFilterBtn').addEventListener('click', () => {
      if (state.filterByDate) {
        state.sortAscending.date = !state.sortAscending.date;
      }
      state.filterByDate = !state.filterByDate;
      state.filterPins = false;
      state.filterBySize = false;
      updateUI();
    });

    document.getElementById('allFilesBtn').addEventListener('click', () => {
      document.getElementById('folderDropdown').value = '';
      state.selectedFolder = '';
      updateUI();
    });

    document.getElementById('folderDropdown').addEventListener('change', (e) => {
      state.selectedFolder = e.target.value;
      updateUI();
    });

    document.getElementById('refreshBtn').addEventListener('click', () => {
      initApp();
      toast('Repository refreshed', 'success');
    });

    document.getElementById('sidebarRefresh').addEventListener('click', () => {
      initApp();
      toast('Repository refreshed', 'success');
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('open');
    });

    document.getElementById('closeInfoBtn').addEventListener('click', () => {
      document.getElementById('fileInfoModal').classList.remove('open');
    });

    document.getElementById('fileInfoModal').addEventListener('click', (e) => {
      if (e.target.id === 'fileInfoModal') {
        document.getElementById('fileInfoModal').classList.remove('open');
      }
    });

    // Scroll to top button
    const scrollBtn = document.getElementById('scrollToTopBtn');
    window.addEventListener('scroll', () => {
      scrollBtn.classList.toggle('show', window.scrollY > 300);
    });

    scrollBtn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Initialize app
    initApp();
  </script>
</body>
