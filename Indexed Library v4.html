<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indexed Library v4</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
          }
        }
      }
    }

  </script>
  <style>
    :root {
      --bg: #08090A;
      --surface: #111214;
      --card: #191B1E;
      --card-hover: #1F2125;
      --border: #282A2E;
      --border-hi: #3A3D42;
      --fg: #EAEAED;
      --muted: #6E7078;
      --accent: #F5A623;
      --accent-dim: rgba(245, 166, 35, 0.1);
      --accent-glow: rgba(245, 166, 35, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }

    .bg-orb-1 {
      width: 500px;
      height: 500px;
      background: var(--accent);
      top: -150px;
      left: -120px;
      animation: orb1 22s ease-in-out infinite;
    }

    .bg-orb-2 {
      width: 350px;
      height: 350px;
      background: #E8614D;
      bottom: -80px;
      right: -80px;
      animation: orb2 28s ease-in-out infinite;
    }

    .bg-orb-3 {
      width: 250px;
      height: 250px;
      background: #34D399;
      top: 40%;
      left: 60%;
      animation: orb3 20s ease-in-out infinite;
    }

    @keyframes orb1 {

      0%,
      100% {
        transform: translate(0, 0)
      }

      33% {
        transform: translate(120px, 100px)
      }

      66% {
        transform: translate(-40px, 150px)
      }
    }

    @keyframes orb2 {

      0%,
      100% {
        transform: translate(0, 0)
      }

      33% {
        transform: translate(-100px, -80px)
      }

      66% {
        transform: translate(80px, -120px)
      }
    }

    @keyframes orb3 {

      0%,
      100% {
        transform: translate(0, 0)
      }

      50% {
        transform: translate(-140px, 70px)
      }
    }

    .noise-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves=[...]
      background-size: 128px 128px;
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    .tab-bar {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding: 10px 16px 6px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .tab-bar::-webkit-scrollbar {
      display: none;
    }

    .tab-item {
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tab-item:hover {
      color: var(--fg);
      background: var(--card);
      border-color: var(--border);
    }

    .tab-item.active {
      color: var(--bg);
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 600;
    }

    .tab-count {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.12);
      font-weight: 600;
      line-height: 1.4;
    }

    .tab-item.active .tab-count {
      background: rgba(0, 0, 0, 0.2);
    }

    .controls-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sort-dropdown {
      padding: 6px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--fg);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .sort-dropdown:hover {
      border-color: var(--accent);
    }

    .view-toggle {
      display: flex;
      gap: 4px;
    }

    .view-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .view-btn:hover {
      border-color: var(--accent);
      color: var(--fg);
    }

    .view-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      padding: 8px 16px 100px;
    }

    .file-grid.list-view {
      grid-template-columns: 1fr;
    }

    .file-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 22px 14px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      min-height: 110px;
      animation: fadeUp 0.4s ease both;
    }

    .file-btn.loading {
      pointer-events: none;
      opacity: 0.6;
    }

    .file-grid.list-view .file-btn {
      flex-direction: row;
      justify-content: flex-start;
      padding: 12px 16px;
      min-height: auto;
      gap: 12px;
    }

    .file-grid.list-view .file-icon {
      margin-bottom: 0 !important;
    }

    .file-grid.list-view .file-name {
      text-align: left;
      flex: 1;
    }

    .file-grid.list-view .file-ext {
      margin-top: 0;
      margin-left: auto;
    }

    .file-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .file-btn:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(245, 166, 35, 0.08);
    }

    .file-btn:hover::after {
      opacity: 1;
    }

    .file-btn:active {
      transform: translateY(-1px);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .file-btn .action-btn {
      position: absolute;
      top: 6px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--muted);
      opacity: 1;
      transition: all 0.2s;
      z-index: 2;
    }

    .file-btn .pin-btn {
      right: 32px;
    }

    .file-btn .download-btn {
      right: 6px;
    }

    .file-grid.list-view .action-btn {
      position: relative;
      top: auto;
      right: auto;
    }

    .file-btn .action-btn:hover {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .file-btn .action-btn.pinned {
      color: var(--accent);
    }

    .file-btn .file-icon {
      width: 30px;
      height: 30px;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    .file-btn .file-name {
      font-size: 12.5px;
      font-weight: 600;
      text-align: center;
      word-break: break-word;
      line-height: 1.3;
      position: relative;
      z-index: 1;
      max-width: 100%;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .file-btn .file-ext {
      font-size: 10px;
      font-weight: 700;
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: relative;
      z-index: 1;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(2px);
    }

    .sidebar-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 300px;
      max-width: 85vw;
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 50;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--fg);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: grab;
      width: 100%;
      text-align: left;
      transition: all 0.2s;
    }

    .sidebar-item:active {
      cursor: grabbing;
    }

    .sidebar-item.dragging {
      opacity: 0.5;
    }

    .sidebar-item.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .sidebar-item:hover {
      border-color: var(--accent);
      background: var(--card-hover);
    }

    .sidebar-action {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--fg);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: all 0.2s;
    }

    .sidebar-action:hover {
      border-color: var(--border-hi);
      background: var(--card);
    }

    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--fg);
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      pointer-events: auto;
      max-width: 320px;
    }

    .toast.error {
      border-color: #E8614D;
      color: #F0A0A0;
    }

    .toast.success {
      border-color: #34D399;
      color: #A0F0D0;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.96)
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1)
      }
    }

    @keyframes toastOut {
      from {
        opacity: 1;
        transform: translateY(0)
      }

      to {
        opacity: 0;
        transform: translateY(8px)
      }
    }

    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, var(--border) 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 14px;
      min-height: 110px;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0
      }

      100% {
        background-position: -200% 0
      }
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .search-wrap {
      position: relative;
      padding: 0 16px 6px;
    }

    .search-wrap input {
      width: 100%;
      padding: 9px 38px 9px 38px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--fg);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
    }

    .search-wrap input::placeholder {
      color: var(--muted);
    }

    .search-wrap .search-icon {
      position: absolute;
      left: 28px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search-wrap .clear-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
      opacity: 0;
      pointer-events: none;
      flex-shrink: 0;
    }

    .search-wrap input:not(:placeholder-shown) ~ .clear-btn {
      opacity: 1;
      pointer-events: all;
    }

    .search-wrap .clear-btn:hover {
      background: var(--accent-dim);
      color: var(--accent);
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 640px) {
      .file-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 10px;
        padding: 6px 12px 100px;
      }

      .controls-bar {
        flex-wrap: wrap;
      }
    }

  </style>
</head>

<body>

  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  <div class="noise-overlay"></div>

  <div class="toast-container" id="toastContainer"></div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main menu">
    <div style="padding:18px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border);">
      <h2 style="font-family:'Space Grotesk',sans-serif; font-size:17px; font-weight:700;">Menu</h2>
      <button id="closeSidebarBtn" style="background:none; border:none; color:var(--fg); cursor:pointer; padding:4px; border-radius:6px; transition:background 0.2s;" aria-label="Close menu">
        <i data-lucide="x" style="width:20px; height:20px;"></i>
      </button>
    </div>
    <div style="padding:20px; flex:1; overflow-y:auto;">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:14px;">
        <i data-lucide="pin" style="width:14px; height:14px; color:var(--accent);"></i>
        <span style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; color:var(--muted);">Pinned</span>
      </div>
      <div id="pinnedList" style="display:flex; flex-direction:column; gap:6px;"></div>
      <p id="pinnedEmpty" style="color:var(--muted); font-size:12px; line-height:1.6; padding:4px 0;">
        No pinned items yet. Hover a file button and tap the pin icon to add it here.
      </p>
    </div>
    <div style="padding:14px 20px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:8px;">
      <button class="sidebar-action" id="sidebarRefresh">
        <i data-lucide="refresh-cw" style="width:15px; height:15px; color:var(--muted);"></i>
        Refresh Repository
      </button>
    </div>
  </aside>

  <div id="mainScreen" style="position:relative; z-index:1; min-height:100vh;">
    <header style="display:flex; align-items:center; justify-content:space-between; padding:10px 16px; border-bottom:1px solid var(--border); background:rgba(8,9,10,0.82); backdrop-filter:blur(16px);">
      <div style="display:flex; align-items:center; gap:12px;">
        <button id="openSidebarBtn" style="background:none; border:none; color:var(--fg); cursor:pointer; padding:6px; border-radius:8px; transition:background 0.2s;" aria-label="Open menu">
          <i data-lucide="menu" style="width:22px; height:22px;"></i>
        </button>
        <div>
          <h1 id="repoTitle" style="font-family:'Space Grotesk',sans-serif; font-size:17px; font-weight:700; line-height:1.2;"></h1>
          <p id="repoSubtitle" style="font-size:11px; color:var(--muted); margin-top:1px;"></p>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:4px;">
        <span id="fileCount" style="font-size:11px; color:var(--muted); margin-right:8px; font-weight:500;"></span>
        <button id="refreshBtn" style="background:none; border:none; color:var(--muted); cursor:pointer; padding:8px; border-radius:8px; transition:all 0.2s;" aria-label="Refresh">
          <i data-lucide="refresh-cw" style="width:17px; height:17px;"></i>
        </button>
      </div>
    </header>

    <nav class="tab-bar" id="tabBar" role="tablist"></nav>

    <div class="controls-bar">
      <select id="sortDropdown" class="sort-dropdown">
        <option value="name">Sort: Name</option>
        <option value="name-desc">Sort: Name (Z-A)</option>
        <option value="extension">Sort: Extension</option>
        <option value="size">Sort: Size</option>
      </select>
      <div class="view-toggle">
        <button id="gridViewBtn" class="view-btn active" title="Grid View">
          <i data-lucide="grid-3x3" style="width:16px; height:16px;"></i>
        </button>
        <button id="listViewBtn" class="view-btn" title="List View">
          <i data-lucide="list" style="width:16px; height:16px;"></i>
        </button>
      </div>
    </div>

    <div class="search-wrap">
      <i data-lucide="search" class="search-icon" style="width:15px; height:15px;"></i>
      <input type="text" id="searchInput" placeholder="Search files..." spellcheck="false">
      <button id="clearSearchBtn" class="clear-btn" title="Clear search" aria-label="Clear search">
        <i data-lucide="x" style="width:16px; height:16px;"></i>
      </button>
    </div>

    <main class="file-grid" id="fileGrid"></main>
  </div>

  <script>
    const state = {
      owner: 'Ion-o-koji',
      repo: 'Ion-o-koji-s-Index',
      branch: '',
      files: [],
      folders: [],
      activeTab: '',
      pinned: [],
      searchQuery: '',
      sortBy: 'name',
      viewMode: 'grid',
      draggedPinIndex: null,
      loadingFiles: new Set(),
    };

    const ALLOWED_EXT = ['html', 'htm', 'md', 'markdown'];

    function savePins() {
      localStorage.setItem('Ion-o-koji_pins', JSON.stringify(state.pinned));
    }

    function saveSortPreference() {
      localStorage.setItem('Ion-o-koji_sortBy', state.sortBy);
    }

    function saveViewPreference() {
      localStorage.setItem('Ion-o-koji_viewMode', state.viewMode);
    }

    function loadPins() {
      try {
        const d = JSON.parse(localStorage.getItem('Ion-o-koji_pins'));
        if (d && Array.isArray(d)) state.pinned = d;
      } catch (e) {}
    }

    function loadPreferences() {
      const sortBy = localStorage.getItem('Ion-o-koji_sortBy');
      const viewMode = localStorage.getItem('Ion-o-koji_viewMode');
      if (sortBy) state.sortBy = sortBy;
      if (viewMode) state.viewMode = viewMode;
    }

    function toast(msg, type = 'info') {
      const c = document.getElementById('toastContainer');
      const el = document.createElement('div');
      el.className = 'toast ' + type;
      el.textContent = msg;
      c.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    function fuzzyMatch(query, str) {
      const lq = query.toLowerCase();
      const ls = str.toLowerCase();
      
      if (ls.includes(lq)) return true;
      
      let qi = 0;
      for (let i = 0; i < ls.length && qi < lq.length; i++) {
        if (ls[i] === lq[qi]) qi++;
      }
      return qi === lq.length;
    }

    async function fetchDefaultBranch(owner, repo) {
      const url = `https://api.github.com/repos/${owner}/${repo}`;
      const res = await fetch(url);
      if (res.status === 404) throw new Error('Repository not found.');
      if (res.status === 403) throw new Error('GitHub API rate limit hit. Wait a minute and try again.');
      if (!res.ok) throw new Error('GitHub API error: ' + res.status);
      const data = await res.json();
      if (data.private) throw new Error('This repository is private.');
      return data.default_branch;
    }

    async function fetchTree(owner, repo, branch) {
      const url = `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Failed to fetch repository tree: ' + res.status);
      const data = await res.json();
      if (data.truncated) toast('Large repo — some files may be missing', 'error');
      return data.tree.filter(i => i.type === 'blob');
    }

    async function fetchFileContent(path) {
      const url = `https://raw.githubusercontent.com/${state.owner}/${state.repo}/${state.branch}/${path}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Failed to fetch file');
      return res.text();
    }

    async function getFileSize(path) {
      const url = `https://api.github.com/repos/${state.owner}/${state.repo}/contents/${path}`;
      const res = await fetch(url);
      if (!res.ok) return 0;
      const data = await res.json();
      return data.size || 0;
    }

    function parseTree(tree) {
      const files = [];
      const folderSet = new Set();

      for (const item of tree) {
        const parts = item.path.split('/');
        if (parts.some(p => p.startsWith('.'))) continue;

        const name = parts[parts.length - 1];
        const ext = name.includes('.') ? name.split('.').pop().toLowerCase() : '';

        if (!ALLOWED_EXT.includes(ext)) continue;

        const folder = parts.length > 1 ? parts.slice(0, -1).join('/') : '';

        files.push({
          name: name.includes('.') ? name.slice(0, name.lastIndexOf('.')) : name,
          fullName: name,
          path: item.path,
          extension: ext,
          folder,
          size: item.size || 0,
        });

        for (let i = 1; i < parts.length; i++) {
          folderSet.add(parts.slice(0, i).join('/'));
        }
      }

      const folders = Array.from(folderSet).sort();
      return {
        files,
        folders
      };
    }

    function fileIcon(ext) {
      if (['html', 'htm'].includes(ext)) return 'globe';
      if (['md', 'markdown'].includes(ext)) return 'file-text';
      return 'file';
    }

    function extColor(ext) {
      if (['html', 'htm'].includes(ext)) return '#E8614D';
      if (['md', 'markdown'].includes(ext)) return '#9CA3AF';
      return '#6E7078';
    }

    function extLabel(ext) {
      if (['html', 'htm'].includes(ext)) return 'HTML';
      if (['md', 'markdown'].includes(ext)) return 'MD';
      return ext.toUpperCase();
    }

    async function downloadFile(file) {
      setFileLoading(file.path, true);
      try {
        const content = await fetchFileContent(file.path);
        const filename = file.fullName;
        
        const blob = new Blob([content], {
          type: "text/html"
        });
        
        if ('showSaveFilePicker' in window) {
          try {
            const handle = await window.showSaveFilePicker({
              suggestedName: filename,
              types: [{
                description: "HTML Files",
                accept: {
                  "text/html": [".html"]
                },
              }],
            });
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            toast('File saved', 'success');
            return;
          } catch (err) {
            if (err.name === 'AbortError') return;
          }
        }

        try {
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          toast('File saved', 'success');
          return;
        } catch (err) {
          toast('Download failed', 'error');
        }
      } catch (e) {
        toast('Failed: ' + e.message, 'error');
      } finally {
        setFileLoading(file.path, false);
      }
    }

    function setFileLoading(filePath, isLoading) {
      if (isLoading) {
        state.loadingFiles.add(filePath);
      } else {
        state.loadingFiles.delete(filePath);
      }
      updateFileButtonStates();
    }

    function updateFileButtonStates() {
      document.querySelectorAll('.file-btn').forEach(btn => {
        const filePath = btn.dataset.path;
        if (state.loadingFiles.has(filePath)) {
          btn.classList.add('loading');
        } else {
          btn.classList.remove('loading');
        }
      });
    }

    async function runFile(file) {
      setFileLoading(file.path, true);
      try {
        const content = await fetchFileContent(file.path);
        const ext = file.extension;

        if (['html', 'htm'].includes(ext)) {
          const w = window.open('about:blank', '_blank');
          if (!w) {
            toast('Pop-up blocked — allow pop-ups for this site', 'error');
            return;
          }
          w.document.open();
          w.document.write(content);
          w.document.close();
        } else if (['md', 'markdown'].includes(ext)) {
          const html = renderMarkdown(content, file.fullName);
          const w = window.open('about:blank', '_blank');
          if (!w) {
            toast('Pop-up blocked — allow pop-ups for this site', 'error');
            return;
          }
          w.document.open();
          w.document.write(html);
          w.document.close();
        }
      } catch (e) {
        toast('Failed: ' + e.message, 'error');
      } finally {
        setFileLoading(file.path, false);
      }
    }

    function renderMarkdown(md, fileName) {
      const html = md.replace(/^### (.*?)$/gm, '<h3>$1</h3>')
        .replace(/^## (.*?)$/gm, '<h2>$1</h2>')
        .replace(/^# (.*?)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
        .replace(/\n/g, '<br>');
      
      return `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${fileName}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; line-height: 1.6; color: #333; }
    h1, h2, h3 { margin-top: 24px; margin-bottom: 12px; }
    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { background: #f6f8fa; padding: 2px 6px; border-radius: 3px; font-family: monospace; }
  </style>
</head>
<body>
  ${html}
</body>
</html>`;
    }

    function getDisplayFiles() {
      let files = state.files;

      if (state.activeTab && state.activeTab !== 'All') {
        files = files.filter(f => f.folder === state.activeTab);
      }

      if (state.searchQuery) {
        files = files.filter(f => fuzzyMatch(state.searchQuery, f.name));
      }

      files.sort((a, b) => {
        if (state.sortBy === 'name') return a.name.localeCompare(b.name);
        if (state.sortBy === 'name-desc') return b.name.localeCompare(a.name);
        if (state.sortBy === 'extension') return a.extension.localeCompare(b.extension);
        if (state.sortBy === 'size') return a.size - b.size;
        return 0;
      });

      return files;
    }

    function renderFileGrid() {
      const grid = document.getElementById('fileGrid');
      const files = getDisplayFiles();

      if (files.length === 0) {
        grid.innerHTML = '<div class="empty-state"><p>No files found</p></div>';
        grid.style.gridColumn = '1 / -1';
        return;
      }

      grid.innerHTML = files.map(file => `
        <button class="file-btn" data-path="${file.path}">
          <button class="action-btn pin-btn ${state.pinned.includes(file.path) ? 'pinned' : ''}" title="Pin">
            <i data-lucide="${state.pinned.includes(file.path) ? 'pin' : 'pin'}" style="width:14px; height:14px;"></i>
          </button>
          <button class="action-btn download-btn" title="Download">
            <i data-lucide="download" style="width:14px; height:14px;"></i>
          </button>
          <i data-lucide="${fileIcon(file.extension)}" class="file-icon"></i>
          <span class="file-name">${file.name}</span>
          <span class="file-ext" style="background-color:${extColor(file.extension)}40; color:${extColor(file.extension)};">${extLabel(file.extension)}</span>
        </button>
      `).join('');

      grid.querySelectorAll('.file-btn').forEach(btn => {
        const path = btn.dataset.path;
        const file = state.files.find(f => f.path === path);
        
        btn.addEventListener('click', (e) => {
          if (!e.target.closest('.action-btn')) {
            runFile(file);
          }
        });

        const pinBtn = btn.querySelector('.pin-btn');
        pinBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (state.pinned.includes(path)) {
            state.pinned = state.pinned.filter(p => p !== path);
          } else {
            state.pinned.push(path);
          }
          savePins();
          renderFileGrid();
          renderPinnedList();
        });

        const dlBtn = btn.querySelector('.download-btn');
        dlBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          downloadFile(file);
        });
      });

      lucide.createIcons();
      updateFileButtonStates();
    }

    function renderPinnedList() {
      const list = document.getElementById('pinnedList');
      const empty = document.getElementById('pinnedEmpty');

      if (state.pinned.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      list.innerHTML = state.pinned.map((path, idx) => {
        const file = state.files.find(f => f.path === path);
        return file ? `
          <button class="sidebar-item" draggable="true" data-path="${path}" data-index="${idx}">
            <i data-lucide="${fileIcon(file.extension)}" style="width:14px; height:14px; flex-shrink:0;"></i>
            <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${file.name}</span>
          </button>
        ` : '';
      }).join('');

      setupPinnedListDragDrop();
      lucide.createIcons();
    }

    function setupPinnedListDragDrop() {
      const items = document.querySelectorAll('#pinnedList .sidebar-item');

      items.forEach(item => {
        item.addEventListener('dragstart', (e) => {
          const index = parseInt(item.dataset.index);
          state.draggedPinIndex = index;
          item.classList.add('dragging');
        });

        item.addEventListener('dragend', (e) => {
          item.classList.remove('dragging');
          items.forEach(i => i.classList.remove('drag-over'));
          state.draggedPinIndex = null;
        });

        item.addEventListener('dragover', (e) => {
          e.preventDefault();
          if (state.draggedPinIndex !== null) {
            item.classList.add('drag-over');
          }
        });

        item.addEventListener('dragleave', (e) => {
          item.classList.remove('drag-over');
        });

        item.addEventListener('drop', (e) => {
          e.preventDefault();
          if (state.draggedPinIndex !== null) {
            const dropIndex = parseInt(item.dataset.index);
            if (dropIndex !== state.draggedPinIndex) {
              const draggedPath = state.pinned[state.draggedPinIndex];
              state.pinned.splice(state.draggedPinIndex, 1);
              state.pinned.splice(dropIndex, 0, draggedPath);
              savePins();
              renderPinnedList();
            }
          }
          item.classList.remove('drag-over');
        });
      });
    }

    function renderTabs() {
      const bar = document.getElementById('tabBar');
      const folders = ['All', ...state.folders];

      bar.innerHTML = folders.map(folder => `
        <button class="tab-item ${state.activeTab === folder ? 'active' : ''}" data-folder="${folder}">
          <span>${folder}</span>
          <span class="tab-count">${folder === 'All' ? state.files.length : state.files.filter(f => f.folder === folder).length}</span>
        </button>
      `).join('');

      bar.querySelectorAll('.tab-item').forEach(tab => {
        tab.addEventListener('click', () => {
          state.activeTab = tab.dataset.folder;
          renderTabs();
          renderFileGrid();
        });
      });

      lucide.createIcons();
    }

    async function init() {
      try {
        const branch = await fetchDefaultBranch(state.owner, state.repo);
        state.branch = branch;

        document.getElementById('repoTitle').textContent = state.repo;
        document.getElementById('repoSubtitle').textContent = state.owner;

        const tree = await fetchTree(state.owner, state.repo, branch);
        const parsed = parseTree(tree);
        state.files = parsed.files;
        state.folders = parsed.folders;
        state.activeTab = 'All';

        document.getElementById('fileCount').textContent = `${state.files.length} files`;

        loadPins();
        loadPreferences();

        renderTabs();
        renderFileGrid();
        renderPinnedList();

        setupEventListeners();
      } catch (e) {
        toast('Error: ' + e.message, 'error');
      }
    }

    function setupEventListeners() {
      const sidebar = document.getElementById('sidebar');
      const sidebarOverlay = document.getElementById('sidebarOverlay');

      document.getElementById('openSidebarBtn').addEventListener('click', () => {
        sidebar.classList.add('open');
        sidebarOverlay.classList.add('open');
      });

      document.getElementById('closeSidebarBtn').addEventListener('click', () => {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('open');
      });

      sidebarOverlay.addEventListener('click', () => {
        sidebar.classList.remove('open');
        sidebarOverlay.classList.remove('open');
      });

      document.getElementById('sidebarRefresh').addEventListener('click', () => init());

      document.getElementById('sortDropdown').addEventListener('change', (e) => {
        state.sortBy = e.target.value;
        saveSortPreference();
        renderFileGrid();
      });

      document.getElementById('gridViewBtn').addEventListener('click', () => {
        state.viewMode = 'grid';
        saveViewPreference();
        document.getElementById('fileGrid').classList.remove('list-view');
        document.getElementById('gridViewBtn').classList.add('active');
        document.getElementById('listViewBtn').classList.remove('active');
      });

      document.getElementById('listViewBtn').addEventListener('click', () => {
        state.viewMode = 'list';
        saveViewPreference();
        document.getElementById('fileGrid').classList.add('list-view');
        document.getElementById('gridViewBtn').classList.remove('active');
        document.getElementById('listViewBtn').classList.add('active');
      });

      document.getElementById('searchInput').addEventListener('input', (e) => {
        state.searchQuery = e.target.value;
        renderFileGrid();
      });

      document.getElementById('clearSearchBtn').addEventListener('click', () => {
        document.getElementById('searchInput').value = '';
        state.searchQuery = '';
        renderFileGrid();
      });

      document.getElementById('refreshBtn').addEventListener('click', () => init());

      if (state.viewMode === 'list') {
        document.getElementById('fileGrid').classList.add('list-view');
        document.getElementById('gridViewBtn').classList.remove('active');
        document.getElementById('listViewBtn').classList.add('active');
      }
    }

    init();
  </script>

</body>

</html>
