<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indexed Library v4</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            body: ['DM Sans', 'sans-serif'],
          }
        }
      }
    }

  </script>
  <style>
    :root {
      --bg: #08090A;
      --surface: #111214;
      --card: #191B1E;
      --card-hover: #1F2125;
      --border: #282A2E;
      --border-hi: #3A3D42;
      --fg: #EAEAED;
      --muted: #6E7078;
      --accent: #F5A623;
      --accent-dim: rgba(245, 166, 35, 0.1);
      --accent-glow: rgba(245, 166, 35, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }

    .bg-orb-1 {
      width: 500px;
      height: 500px;
      background: var(--accent);
      top: -150px;
      left: -120px;
      animation: orb1 22s ease-in-out infinite;
    }

    .bg-orb-2 {
      width: 350px;
      height: 350px;
      background: #E8614D;
      bottom: -80px;
      right: -80px;
      animation: orb2 28s ease-in-out infinite;
    }

    .bg-orb-3 {
      width: 250px;
      height: 250px;
      background: #34D399;
      top: 40%;
      left: 60%;
      animation: orb3 20s ease-in-out infinite;
    }

    @keyframes orb1 {

      0%,
      100% {
        transform: translate(0, 0)
      }

      33% {
        transform: translate(120px, 100px)
      }

      66% {
        transform: translate(-40px, 150px)
      }
    }

    @keyframes orb2 {

      0%,
      100% {
        transform: translate(0, 0)
      }

      33% {
        transform: translate(-100px, -80px)
      }

      66% {
        transform: translate(80px, -120px)
      }
    }

    @keyframes orb3 {

      0%,
      100% {
        transform: translate(0, 0)
      }

      50% {
        transform: translate(-140px, 70px)
      }
    }

    .noise-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOct[...]
      background-size: 128px 128px;
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    .tab-bar {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding: 10px 16px 6px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .tab-bar::-webkit-scrollbar {
      display: none;
    }

    .tab-item {
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--muted);
      background: transparent;
      border: 1px solid transparent;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tab-item:hover {
      color: var(--fg);
      background: var(--card);
      border-color: var(--border);
    }

    .tab-item.active {
      color: var(--bg);
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 600;
    }

    .tab-count {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.12);
      font-weight: 600;
      line-height: 1.4;
    }

    .tab-item.active .tab-count {
      background: rgba(0, 0, 0, 0.2);
    }

    .controls-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sort-dropdown {
      padding: 6px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--fg);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .sort-dropdown:hover {
      border-color: var(--accent);
    }

    .view-toggle {
      display: flex;
      gap: 4px;
    }

    .view-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .view-btn:hover {
      border-color: var(--accent);
      color: var(--fg);
    }

    .view-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      padding: 8px 16px 100px;
    }

    .file-grid.list-view {
      grid-template-columns: 1fr;
    }

    .file-btn {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 22px 14px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      min-height: 110px;
      animation: fadeUp 0.4s ease both;
    }

    .file-grid.list-view .file-btn {
      flex-direction: row;
      justify-content: flex-start;
      padding: 12px 16px;
      min-height: auto;
      gap: 12px;
    }

    .file-grid.list-view .file-icon {
      margin-bottom: 0 !important;
    }

    .file-grid.list-view .file-name {
      text-align: left;
      flex: 1;
    }

    .file-grid.list-view .file-ext {
      margin-top: 0;
      margin-left: auto;
    }

    .file-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .file-btn:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(245, 166, 35, 0.08);
    }

    .file-btn:hover::after {
      opacity: 1;
    }

    .file-btn:active {
      transform: translateY(-1px);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .file-btn .action-btn {
      position: absolute;
      top: 6px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--muted);
      opacity: 1;
      transition: all 0.2s;
      z-index: 2;
    }

    .file-btn .pin-btn {
      right: 32px;
    }

    .file-btn .download-btn {
      right: 6px;
    }

    .file-grid.list-view .action-btn {
      position: relative;
      top: auto;
      right: auto;
    }

    .file-btn .action-btn:hover {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .file-btn .action-btn.pinned {
      color: var(--accent);
    }

    .file-btn .file-icon {
      width: 30px;
      height: 30px;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    .file-btn .file-name {
      font-size: 12.5px;
      font-weight: 600;
      text-align: center;
      word-break: break-word;
      line-height: 1.3;
      position: relative;
      z-index: 1;
      max-width: 100%;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .file-btn .file-ext {
      font-size: 10px;
      font-weight: 700;
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: relative;
      z-index: 1;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(2px);
    }

    .sidebar-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 300px;
      max-width: 85vw;
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 50;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--fg);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: grab;
      width: 100%;
      text-align: left;
      transition: all 0.2s;
    }

    .sidebar-item:active {
      cursor: grabbing;
    }

    .sidebar-item.dragging {
      opacity: 0.5;
    }

    .sidebar-item.drag-over {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .sidebar-item:hover {
      border-color: var(--accent);
      background: var(--card-hover);
    }

    .sidebar-action {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--fg);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: all 0.2s;
    }

    .sidebar-action:hover {
      border-color: var(--border-hi);
      background: var(--card);
    }

    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--fg);
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      pointer-events: auto;
      max-width: 320px;
    }

    .toast.error {
      border-color: #E8614D;
      color: #F0A0A0;
    }

    .toast.success {
      border-color: #34D399;
      color: #A0F0D0;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.96)
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1)
      }
    }

    @keyframes toastOut {
      from {
        opacity: 1;
        transform: translateY(0)
      }

      to {
        opacity: 0;
        transform: translateY(8px)
      }
    }

    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, var(--border) 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 14px;
      min-height: 110px;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0
      }

      100% {
        background-position: -200% 0
      }
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .search-wrap {
      position: relative;
      padding: 0 16px 6px;
    }

    .search-wrap input {
      width: 100%;
      padding: 9px 14px 9px 38px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--fg);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
    }

    .search-wrap input::placeholder {
      color: var(--muted);
    }

    .search-wrap .search-icon {
      position: absolute;
      left: 28px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .search-wrap .clear-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
      opacity: 0;
      pointer-events: none;
    }

    .search-wrap input:not(:placeholder-shown) ~ .clear-btn {
      opacity: 1;
      pointer-events: all;
    }

    .search-wrap .clear-btn:hover {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .file-btn.loading {
      pointer-events: none;
      opacity: 0.6;
    }

    .file-btn.loading::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(245, 166, 35, 0.2) 50%, transparent 100%);
      animation: loadingPulse 1.5s infinite;
      border-radius: 14px;
      z-index: 0;
    }

    @keyframes loadingPulse {
      0% {
        background-position: -1000px 0;
      }
      100% {
        background-position: 1000px 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 640px) {
      .file-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 10px;
        padding: 6px 12px 100px;
      }

      .controls-bar {
        flex-wrap: wrap;
      }
    }

  </style>
</head>

<body>

  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  <div class="noise-overlay"></div>

  <div class="toast-container" id="toastContainer"></div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar" role="navigation" aria-label="Main menu">
    <div style="padding:18px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border);">
      <h2 style="font-family:'Space Grotesk',sans-serif; font-size:17px; font-weight:700;">Menu</h2>
      <button id="closeSidebarBtn" style="background:none; border:none; color:var(--fg); cursor:pointer; padding:4px; border-radius:6px; transition:background 0.2s;" aria-label="Close menu">
        <i data-lucide="x" style="width:20px; height:20px;"></i>
      </button>
    </div>
    <div style="padding:20px; flex:1; overflow-y:auto;">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:14px;">
        <i data-lucide="pin" style="width:14px; height:14px; color:var(--accent);"></i>
        <span style="font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px; color:var(--muted);">Pinned</span>
      </div>
      <div id="pinnedList" style="display:flex; flex-direction:column; gap:6px;"></div>
      <p id="pinnedEmpty" style="color:var(--muted); font-size:12px; line-height:1.6; padding:4px 0;">
        No pinned items yet. Hover a file button and tap the pin icon to add it here.
      </p>
    </div>
    <div style="padding:14px 20px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:8px;">
      <button class="sidebar-action" id="sidebarRefresh">
        <i data-lucide="refresh-cw" style="width:15px; height:15px; color:var(--muted);"></i>
        Refresh Repository
      </button>
    </div>
  </aside>

  <div id="mainScreen" style="position:relative; z-index:1; min-height:100vh;">
    <header style="display:flex; align-items:center; justify-content:space-between; padding:10px 16px; border-bottom:1px solid var(--border); background:rgba(8,9,10,0.82); backdrop-filter:blur(16[...]
      <div style="display:flex; align-items:center; gap:12px;">
        <button id="openSidebarBtn" style="background:none; border:none; color:var(--fg); cursor:pointer; padding:6px; border-radius:8px; transition:background 0.2s;" aria-label="Open menu">
          <i data-lucide="menu" style="width:22px; height:22px;"></i>
        </button>
        <div>
          <h1 id="repoTitle" style="font-family:'Space Grotesk',sans-serif; font-size:17px; font-weight:700; line-height:1.2;"></h1>
          <p id="repoSubtitle" style="font-size:11px; color:var(--muted); margin-top:1px;"></p>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:4px;">
        <span id="fileCount" style="font-size:11px; color:var(--muted); margin-right:8px; font-weight:500;"></span>
        <button id="refreshBtn" style="background:none; border:none; color:var(--muted); cursor:pointer; padding:8px; border-radius:8px; transition:all 0.2s;" aria-label="Refresh">
          <i data-lucide="refresh-cw" style="width:17px; height:17px;"></i>
        </button>
      </div>
    </header>

    <nav class="tab-bar" id="tabBar" role="tablist"></nav>

    <div class="controls-bar">
      <select id="sortDropdown" class="sort-dropdown">
        <option value="name">Sort: Name</option>
        <option value="name-desc">Sort: Name (Z-A)</option>
        <option value="extension">Sort: Extension</option>
        <option value="size">Sort: Size</option>
      </select>
      <div class="view-toggle">
        <button id="gridViewBtn" class="view-btn active" title="Grid View">
          <i data-lucide="grid-3x3" style="width:16px; height:16px;"></i>
        </button>
        <button id="listViewBtn" class="view-btn" title="List View">
          <i data-lucide="list" style="width:16px; height:16px;"></i>
        </button>
      </div>
    </div>

    <div class="search-wrap">
      <i data-lucide="search" class="search-icon" style="width:15px; height:15px;"></i>
      <input type="text" id="searchInput" placeholder="Search files..." spellcheck="false">
      <button id="clearSearchBtn" class="clear-btn" title="Clear search" aria-label="Clear search">
        <i data-lucide="x" style="width:16px; height:16px;"></i>
      </button>
    </div>

    <main class="file-grid" id="fileGrid"></main>
  </div>

  <script>
    const state = {
      owner: 'Ion-o-koji',
      repo: 'Ion-o-koji-s-Index',
      branch: '',
      files: [],
      folders: [],
      activeTab: '',
      pinned: [],
      searchQuery: '',
      sortBy: 'name',
      viewMode: 'grid',
      draggedPinIndex: null,
      loadingPaths: new Set(),
    };

    const ALLOWED_EXT = ['html', 'htm', 'md', 'markdown'];

    function savePins() {
      localStorage.setItem('Ion-o-koji_pins', JSON.stringify(state.pinned));
    }

    function saveSortPreference() {
      localStorage.setItem('Ion-o-koji_sortBy', state.sortBy);
    }

    function saveViewPreference() {
      localStorage.setItem('Ion-o-koji_viewMode', state.viewMode);
    }

    function loadPins() {
      try {
        const d = JSON.parse(localStorage.getItem('Ion-o-koji_pins'));
        if (d && Array.isArray(d)) state.pinned = d;
      } catch (e) {}
    }

    function loadPreferences() {
      const sortBy = localStorage.getItem('Ion-o-koji_sortBy');
      const viewMode = localStorage.getItem('Ion-o-koji_viewMode');
      if (sortBy) state.sortBy = sortBy;
      if (viewMode) state.viewMode = viewMode;
    }

    function toast(msg, type = 'info') {
      const c = document.getElementById('toastContainer');
      const el = document.createElement('div');
      el.className = 'toast ' + type;
      el.textContent = msg;
      c.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    async function fetchDefaultBranch(owner, repo) {
      const url = `https://api.github.com/repos/${owner}/${repo}`;
      const res = await fetch(url);
      if (res.status === 404) throw new Error('Repository not found.');
      if (res.status === 403) throw new Error('GitHub API rate limit hit. Wait a minute and try again.');
      if (!res.ok) throw new Error('GitHub API error: ' + res.status);
      const data = await res.json();
      if (data.private) throw new Error('This repository is private.');
      return data.default_branch;
    }

    async function fetchTree(owner, repo, branch) {
      const url = `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Failed to fetch repository tree: ' + res.status);
      const data = await res.json();
      if (data.truncated) toast('Large repo — some files may be missing', 'error');
      return data.tree.filter(i => i.type === 'blob');
    }

    async function fetchFileContent(path) {
      const url = `https://raw.githubusercontent.com/${state.owner}/${state.repo}/${state.branch}/${path}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Failed to fetch file');
      return res.text();
    }

    async function getFileSize(path) {
      const url = `https://api.github.com/repos/${state.owner}/${state.repo}/contents/${path}`;
      const res = await fetch(url);
      if (!res.ok) return 0;
      const data = await res.json();
      return data.size || 0;
    }

    function levenshteinDistance(a, b) {
      const an = a.length;
      const bn = b.length;
      const dp = Array(bn + 1).fill(0).map(() => Array(an + 1).fill(0));
      for (let i = 0; i <= an; i++) dp[0][i] = i;
      for (let j = 0; j <= bn; j++) dp[j][0] = j;
      for (let j = 1; j <= bn; j++) {
        for (let i = 1; i <= an; i++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          dp[j][i] = Math.min(dp[j - 1][i] + 1, dp[j][i - 1] + 1, dp[j - 1][i - 1] + cost);
        }
      }
      return dp[bn][an];
    }

    function fuzzyMatch(query, text) {
      const q = query.toLowerCase();
      const t = text.toLowerCase();
      if (t.includes(q)) return true;
      const distance = levenshteinDistance(q, t);
      const threshold = Math.ceil(Math.max(q.length, t.length) * 0.4);
      return distance <= threshold;
    }

    function parseTree(tree) {
      const files = [];
      const folderSet = new Set();

      for (const item of tree) {
        const parts = item.path.split('/');
        if (parts.some(p => p.startsWith('.'))) continue;

        const name = parts[parts.length - 1];
        const ext = name.includes('.') ? name.split('.').pop().toLowerCase() : '';

        if (!ALLOWED_EXT.includes(ext)) continue;

        const folder = parts.length > 1 ? parts.slice(0, -1).join('/') : '';

        files.push({
          name: name.includes('.') ? name.slice(0, name.lastIndexOf('.')) : name,
          fullName: name,
          path: item.path,
          extension: ext,
          folder,
          size: item.size || 0,
        });

        for (let i = 1; i < parts.length; i++) {
          folderSet.add(parts.slice(0, i).join('/'));
        }
      }

      const folders = Array.from(folderSet).sort();
      return {
        files,
        folders
      };
    }

    function fileIcon(ext) {
      if (['html', 'htm'].includes(ext)) return 'globe';
      if (['md', 'markdown'].includes(ext)) return 'file-text';
      return 'file';
    }

    function extColor(ext) {
      if (['html', 'htm'].includes(ext)) return '#E8614D';
      if (['md', 'markdown'].includes(ext)) return '#9CA3AF';
      return '#6E7078';
    }

    function extLabel(ext) {
      if (['html', 'htm'].includes(ext)) return 'HTML';
      if (['md', 'markdown'].includes(ext)) return 'MD';
      return ext.toUpperCase();
    }

    async function downloadFile(file) {
      try {
        state.loadingPaths.add(file.path);
        updateFileButton(file);
        const content = await fetchFileContent(file.path);
        const filename = file.fullName;
        
        const blob = new Blob([content], {
          type: "text/html"
        });
        
        if (false) {}

        if ('showSaveFilePicker' in window) {
          try {
            const handle = await window.showSaveFilePicker({
              suggestedName: filename,
              types: [{
                description: "HTML Files",
                accept: {
                  "text/html": [".html"]
                },
              }],
            });
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            toast('File saved', 'success');
            state.loadingPaths.delete(file.path);
            updateFileButton(file);
            return;
          } catch (err) {
            if (err.name === 'AbortError') {
              state.loadingPaths.delete(file.path);
              updateFileButton(file);
              return;
            }
          }
        }

        try {
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          toast('File saved', 'success');
          state.loadingPaths.delete(file.path);
          updateFileButton(file);
          return;
        } catch (err) {
          toast('Download failed', 'error');
        }
      } catch (e) {
        toast('Failed: ' + e.message, 'error');
      }
      state.loadingPaths.delete(file.path);
      updateFileButton(file);
    }

    async function runFile(file) {
      try {
        state.loadingPaths.add(file.path);
        updateFileButton(file);
        const content = await fetchFileContent(file.path);
        const ext = file.extension;

        if (['html', 'htm'].includes(ext)) {
          const w = window.open('about:blank', '_blank');
          if (!w) {
            toast('Pop-up blocked — allow pop-ups for this site', 'error');
            state.loadingPaths.delete(file.path);
            updateFileButton(file);
            return;
          }
          w.document.open();
          w.document.write(content);
          w.document.close();
        } else if (['md', 'markdown'].includes(ext)) {
          const html = renderMarkdown(content, file.fullName);
          const w = window.open('about:blank', '_blank');
          if (!w) {
            toast('Pop-up blocked — allow pop-ups for this site', 'error');
            state.loadingPaths.delete(file.path);
            updateFileButton(file);
            return;
          }
          w.document.open();
          w.document.write(html);
          w.document.close();
        }
        state.loadingPaths.delete(file.path);
        updateFileButton(file);
      } catch (e) {
        toast('Failed: ' + e.message, 'error');
        state.loadingPaths.delete(file.path);
        updateFileButton(file);
      }
    }

    function updateFileButton(file) {
      const btn = document.querySelector(`[data-path="${file.path}"]`);
      if (btn) {
        if (state.loadingPaths.has(file.path)) {
          btn.classList.add('loading');
        } else {
          btn.classList.remove('loading');
        }
      }
    }

    function renderMarkdown(md, filename) {
      const escaped = md.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      let html = `<pre style="font-family:monospace; white-space:pre-wrap; word-wrap:break-word;">${escaped}</pre>`;
      return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${filename}</title><style>body{background:#1a1a1a;color:#eee;padding:20px;font-family:system-ui;}</style></head><body>${html}</body></html>`;
    }

    function filterAndSortFiles() {
      let f = state.files;
      if (state.activeTab) f = f.filter(x => x.folder === state.activeTab);
      if (state.searchQuery) f = f.filter(x => fuzzyMatch(state.searchQuery, x.name) || fuzzyMatch(state.searchQuery, x.fullName));
      
      if (state.sortBy === 'name') f.sort((a, b) => a.name.localeCompare(b.name));
      if (state.sortBy === 'name-desc') f.sort((a, b) => b.name.localeCompare(a.name));
      if (state.sortBy === 'extension') f.sort((a, b) => a.extension.localeCompare(b.extension));
      if (state.sortBy === 'size') f.sort((a, b) => a.size - b.size);
      
      return f;
    }

    function renderFileGrid() {
      const grid = document.getElementById('fileGrid');
      const files = filterAndSortFiles();
      
      if (files.length === 0) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><p>' + (state.searchQuery ? 'No files match your search' : 'No files in this folder') + '</p></div>';
        return;
      }
      
      grid.innerHTML = files.map(f => {
        const isPinned = state.pinned.includes(f.path);
        return `
          <button class="file-btn" data-path="${f.path}" title="${f.fullName}">
            <i class="file-icon" data-lucide="${fileIcon(f.extension)}" style="width:30px; height:30px;"></i>
            <div class="file-name">${f.name}</div>
            <div class="file-ext" style="background-color:${extColor(f.extension)}40;color:${extColor(f.extension)};">${extLabel(f.extension)}</div>
            <button class="action-btn pin-btn ${isPinned ? 'pinned' : ''}" data-action="pin" title="${isPinned ? 'Unpin' : 'Pin'}">
              <i data-lucide="pin" style="width:16px; height:16px;"></i>
            </button>
            <button class="action-btn download-btn" data-action="download" title="Download">
              <i data-lucide="download" style="width:16px; height:16px;"></i>
            </button>
          </button>
        `;
      }).join('');
      
      lucide.createIcons();
      
      grid.querySelectorAll('.file-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          if (e.target.closest('.action-btn')) return;
          const path = btn.dataset.path;
          const file = state.files.find(f => f.path === path);
          if (file) runFile(file);
        });
      });

      grid.querySelectorAll('[data-action="pin"]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const path = btn.closest('.file-btn').dataset.path;
          const idx = state.pinned.indexOf(path);
          if (idx > -1) state.pinned.splice(idx, 1);
          else state.pinned.push(path);
          savePins();
          renderFileGrid();
          renderPinnedList();
        });
      });

      grid.querySelectorAll('[data-action="download"]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const path = btn.closest('.file-btn').dataset.path;
          const file = state.files.find(f => f.path === path);
          if (file) downloadFile(file);
        });
      });
    }

    function renderPinnedList() {
      const list = document.getElementById('pinnedList');
      const empty = document.getElementById('pinnedEmpty');
      const items = state.pinned.map(p => state.files.find(f => f.path === p)).filter(Boolean);
      
      if (items.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      
      empty.style.display = 'none';
      list.innerHTML = items.map((f, i) => `
        <div class="sidebar-item" data-pin-index="${i}" draggable="true">
          <i data-lucide="${fileIcon(f.extension)}" style="width:16px; height:16px; color:${extColor(f.extension)};"></i>
          <span style="flex:1;">${f.name}</span>
        </div>
      `).join('');
      
      lucide.createIcons();
      
      const pinItems = list.querySelectorAll('.sidebar-item');
      pinItems.forEach((el, i) => {
        el.addEventListener('dragstart', () => {
          state.draggedPinIndex = i;
          el.classList.add('dragging');
        });
        el.addEventListener('dragend', () => {
          pinItems.forEach(e => e.classList.remove('dragging', 'drag-over'));
        });
        el.addEventListener('dragover', (e) => {
          e.preventDefault();
          if (state.draggedPinIndex === null) return;
          el.classList.add('drag-over');
        });
        el.addEventListener('dragleave', () => {
          el.classList.remove('drag-over');
        });
        el.addEventListener('drop', (e) => {
          e.preventDefault();
          el.classList.remove('drag-over');
          if (state.draggedPinIndex === null || state.draggedPinIndex === i) return;
          const draggedPath = state.pinned[state.draggedPinIndex];
          state.pinned.splice(state.draggedPinIndex, 1);
          state.pinned.splice(i, 0, draggedPath);
          savePins();
          renderPinnedList();
        });
        el.addEventListener('click', () => {
          const file = items[i];
          runFile(file);
        });
      });
    }

    function renderTabs() {
      const tabBar = document.getElementById('tabBar');
      const tabs = [
        { folder: '', label: 'All', count: state.files.length },
        ...state.folders.map(f => ({
          folder: f,
          label: f.split('/').pop(),
          count: state.files.filter(x => x.folder === f).length
        }))
      ];
      
      tabBar.innerHTML = tabs.map(t => `
        <button class="tab-item ${state.activeTab === t.folder ? 'active' : ''}" data-folder="${t.folder}">
          ${t.label}
          <span class="tab-count">${t.count}</span>
        </button>
      `).join('');
      
      tabBar.querySelectorAll('.tab-item').forEach(btn => {
        btn.addEventListener('click', () => {
          state.activeTab = btn.dataset.folder;
          renderTabs();
          renderFileGrid();
        });
      });
    }

    async function init() {
      try {
        loadPins();
        loadPreferences();
        const branch = await fetchDefaultBranch(state.owner, state.repo);
        state.branch = branch;
        document.getElementById('repoTitle').textContent = state.repo;
        document.getElementById('repoSubtitle').textContent = branch;
        const tree = await fetchTree(state.owner, state.repo, branch);
        const parsed = parseTree(tree);
        state.files = parsed.files;
        state.folders = parsed.folders;
        document.getElementById('fileCount').textContent = state.files.length + ' files';
        renderTabs();
        renderFileGrid();
        renderPinnedList();
      } catch (e) {
        toast(e.message, 'error');
      }
    }

    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', (e) => {
      state.searchQuery = e.target.value;
      renderFileGrid();
    });

    const clearSearchBtn = document.getElementById('clearSearchBtn');
    clearSearchBtn.addEventListener('click', () => {
      searchInput.value = '';
      state.searchQuery = '';
      renderFileGrid();
    });

    document.getElementById('sortDropdown').addEventListener('change', (e) => {
      state.sortBy = e.target.value;
      saveSortPreference();
      renderFileGrid();
    });

    document.getElementById('gridViewBtn').addEventListener('click', () => {
      state.viewMode = 'grid';
      saveViewPreference();
      document.getElementById('gridViewBtn').classList.add('active');
      document.getElementById('listViewBtn').classList.remove('active');
      document.getElementById('fileGrid').classList.remove('list-view');
    });

    document.getElementById('listViewBtn').addEventListener('click', () => {
      state.viewMode = 'list';
      saveViewPreference();
      document.getElementById('listViewBtn').classList.add('active');
      document.getElementById('gridViewBtn').classList.remove('active');
      document.getElementById('fileGrid').classList.add('list-view');
    });

    document.getElementById('openSidebarBtn').addEventListener('click', () => {
      document.getElementById('sidebar').classList.add('open');
      document.getElementById('sidebarOverlay').classList.add('open');
    });

    document.getElementById('closeSidebarBtn').addEventListener('click', () => {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('open');
    });

    document.getElementById('sidebarOverlay').addEventListener('click', () => {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('open');
    });

    document.getElementById('refreshBtn').addEventListener('click', init);
    document.getElementById('sidebarRefresh').addEventListener('click', init);

    if (state.viewMode === 'list') {
      document.getElementById('listViewBtn').classList.add('active');
      document.getElementById('gridViewBtn').classList.remove('active');
      document.getElementById('fileGrid').classList.add('list-view');
    }

    init();
  </script>
</body>

</html>
